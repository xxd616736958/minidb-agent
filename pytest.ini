[pytest]
markers =
    quick: fast unit and integration checks for every local run
    db: tests that require a real PostgreSQL test database
    delivery: artifact generation, delivery package, manifest, and final report checks
    e2e: end-to-end agent workflow tests
    security: safety guardrail and permission regression tests
    delegation: controlled multi-agent delegation and subagent review checks
    model_routing: model abstraction, routing, invocation audit, and provider adapter checks
    replay: historical task replay regression tests
    release: broader release qualification checks
